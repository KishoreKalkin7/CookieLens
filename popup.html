<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 20px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
    }

    /* Score circle */
    .score-section {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .score-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      flex-direction: column;
    }

    .score-number {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .score-label {
      font-size: 9px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .score-info .verdict {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .score-info .summary {
      font-size: 11px;
      color: #aaa;
      line-height: 1.5;
    }

    /* Verdict colors */
    .GREEN .score-circle { background: #0d2e1f; border: 2px solid #1d9e75; }
    .GREEN .score-number { color: #1d9e75; }
    .GREEN .verdict { color: #1d9e75; }

    .AMBER .score-circle { background: #2e1f0d; border: 2px solid #e6931a; }
    .AMBER .score-number { color: #e6931a; }
    .AMBER .verdict { color: #e6931a; }

    .RED .score-circle { background: #2e0d0d; border: 2px solid #e63e1a; }
    .RED .score-number { color: #e63e1a; }
    .RED .verdict { color: #e63e1a; }

    /* Sections */
    .info-block {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .info-block .block-title {
      font-size: 10px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      background: #2a2a2a;
      color: #ccc;
    }

    .dpdp-text {
      font-size: 11px;
      color: #aaa;
      line-height: 1.5;
    }

    .dpdp-badge {
      display: inline-block;
      font-size: 10px;
      background: #1a2e3e;
      color: #5aabdd;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    /* States */
    .state-box {
      text-align: center;
      padding: 32px 16px;
      color: #666;
      font-size: 13px;
      line-height: 1.6;
    }

    .state-box .icon { font-size: 28px; margin-bottom: 8px; }
    .state-box .state-title { font-size: 14px; color: #999; font-weight: 500; margin-bottom: 4px; }

    .url-text {
      font-size: 10px;
      color: #555;
      margin-top: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🔍</div>
    <div>
      <div class="title">CookieLens</div>
      <div class="subtitle">Privacy policy analyser</div>
    </div>
  </div>

  <div id="content"></div>

  <script src="popup.js"></script>
</body>
</html>
